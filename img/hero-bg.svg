<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Ciel gradient — du violet nuit au noir profond -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#09071a"/>
      <stop offset="40%"  stop-color="#12083a"/>
      <stop offset="75%"  stop-color="#1a0b4e"/>
      <stop offset="100%" stop-color="#0d0520"/>
    </linearGradient>
    <!-- Lueur horizon -->
    <radialGradient id="horizon" cx="50%" cy="78%" r="55%">
      <stop offset="0%"   stop-color="#5b2de8" stop-opacity="0.45"/>
      <stop offset="45%"  stop-color="#3a1a9e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#09071a" stop-opacity="0"/>
    </radialGradient>
    <!-- Lueur gauche -->
    <radialGradient id="glowL" cx="15%" cy="60%" r="40%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#09071a" stop-opacity="0"/>
    </radialGradient>
    <!-- Lueur droite -->
    <radialGradient id="glowR" cx="85%" cy="55%" r="38%">
      <stop offset="0%"   stop-color="#4f46e5" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#09071a" stop-opacity="0"/>
    </radialGradient>
    <!-- Fondu bas vers couleur bg site -->
    <linearGradient id="fadeBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="60%"  stop-color="#09071a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0c0c18" stop-opacity="1"/>
    </linearGradient>
    <!-- Bokeh blur -->
    <filter id="bokeh" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Fond ciel nuit -->
  <rect width="1440" height="900" fill="url(#sky)"/>

