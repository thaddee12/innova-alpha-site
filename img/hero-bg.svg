    <rect x="737"  y="518" width="111" height="26"/>
    <rect x="785"  y="475" width="14"  height="48"/>
    <rect x="840"  y="680" width="55"  height="220"/>
    <rect x="890"  y="705" width="45"  height="195"/>
    <rect x="930"  y="650" width="72"  height="250"/>
