    <circle cx="1060" cy="100" r="0.7"/>
    <circle cx="1180" cy="125" r="0.9"/>
    <circle cx="1310" cy="90"  r="0.8"/>
    <circle cx="1410" cy="115" r="0.6"/>
  </g>

