  <!-- Bokeh lights — halos de lumières de rue floutés -->
  <g filter="url(#bokeh)" opacity="0.6">
    <circle cx="150"  cy="780" r="12" fill="#ffe8a0"/>
    <circle cx="320"  cy="790" r="10" fill="#ffd080"/>
    <circle cx="490"  cy="785" r="14" fill="#ffe8a0"/>
