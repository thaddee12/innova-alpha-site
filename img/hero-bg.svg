    <rect x="520"  y="595" width="8" height="6" fill="#ffe8a0"/>
    <rect x="535"  y="595" width="8" height="6" fill="#fff0b0"/>
    <rect x="565"  y="595" width="8" height="6" fill="#ffe8a0"/>

