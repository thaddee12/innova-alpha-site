    <path d="M0 680 Q100 640 200 660 Q320 630 440 655 Q560 630 680 650 Q800 635 920 652 Q1040 632 1160 650 Q1280 635 1440 655 L1440 900 L0 900 Z" fill="#100924"/>
  </g>

