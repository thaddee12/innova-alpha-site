    <rect x="1070" y="594" width="8" height="5" fill="#ffe8a0"/>
    <rect x="1040" y="607" width="8" height="5" fill="#fff4c0"/>
    <rect x="1070" y="607" width="8" height="5" fill="#ffe8a0"/>

    <rect x="1264" y="612" width="9" height="6" fill="#ffe8a0"/>
    <rect x="1280" y="612" width="9" height="6" fill="#fff0b0"/>
    <rect x="1296" y="612" width="9" height="6" fill="#ffe8a0"/>
    <rect x="1264" y="626" width="9" height="6" fill="#fff0b0"/>
